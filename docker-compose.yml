version: "3.9"

services:
  crawler:
    build: .
    command: start --seed $(SEED) --depth $(DEPTH)
    environment:
      - WEBCRAWLER_CRAWLER_MAX_DEPTH=2
      - WEBCRAWLER_CRAWLER_CONCURRENCY=5
    depends_on:
      - postgres
      - redis
    
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: crawler
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "9090:9090"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"

volumes:
  pgdata: